# ‚ĖÄ‚Ėą‚ĖÄ ‚Ėą‚ĖĄ ‚ĖĄ‚Ėą ‚Ėą ‚Ėą ‚ĖÄ‚ĖĄ‚ĖÄ   ‚ĖĄ‚ĖÄ‚ĖÄ ‚ĖĄ‚ĖÄ‚ĖĄ ‚Ėą‚ĖĄ ‚Ėą ‚Ėą‚ĖÄ ‚Ėą ‚ĖĄ‚ĖÄ 
#  ‚Ėą  ‚Ėą ‚ĖÄ ‚Ėą ‚ĖÄ‚ĖĄ‚Ėą ‚Ėą ‚Ėą   ‚ĖÄ‚ĖĄ‚ĖĄ ‚ĖÄ‚ĖĄ‚ĖÄ ‚Ėą ‚ĖÄ‚Ėą ‚Ėą‚ĖÄ ‚Ėą ‚ĖÄ‚ĖĄ‚Ėą

# ‚ĖĄ‚ĖÄ  ‚Ėą‚Ėą‚ĖÄ ‚Ėą‚ĖĄ ‚Ėą ‚Ėą‚Ėą‚ĖÄ ‚Ėą‚ĖÄ‚ĖĄ ‚ĖĄ‚ĖÄ‚ĖĄ ‚Ėą  
# ‚ĖÄ‚ĖĄ‚Ėą ‚Ėą‚ĖĄ‚ĖĄ ‚Ėą ‚ĖÄ‚Ėą ‚Ėą‚ĖĄ‚ĖĄ ‚Ėą‚ĖÄ‚ĖĄ ‚Ėą‚ĖÄ‚Ėą ‚Ėą‚ĖĄ‚ĖĄ
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 10000
set -g set-clipboard on
set -g default-terminal "${TERM}"
set -g mouse on

# ‚Ėą‚ĖĄ‚ĖÄ ‚Ėą‚Ėą‚ĖÄ ‚ĖÄ‚ĖĄ‚ĖÄ ‚Ėą‚Ėą‚ĖĄ ‚Ėą ‚Ėą‚ĖĄ ‚Ėą ‚Ėą‚ĖÄ‚ĖĄ ‚Ėą ‚Ėą‚ĖĄ ‚Ėą ‚ĖĄ‚ĖÄ  ‚ĖĄ‚ĖÄ‚ĖÄ
# ‚Ėą ‚Ėą ‚Ėą‚ĖĄ‚ĖĄ  ‚Ėą  ‚Ėą‚ĖĄ‚Ėą ‚Ėą ‚Ėą ‚ĖÄ‚Ėą ‚Ėą‚ĖĄ‚ĖÄ ‚Ėą ‚Ėą ‚ĖÄ‚Ėą ‚ĖÄ‚ĖĄ‚Ėą ‚ĖĄ‚Ėą‚Ėą
set -g prefix ^B
bind h select-pane -L
bind j select-pane -D 
bind k select-pane -U
bind l select-pane -R

# ‚Ėą‚ĖÄ‚ĖĄ ‚Ėą   ‚Ėą ‚Ėą ‚ĖĄ‚ĖÄ  ‚Ėą ‚Ėą‚ĖĄ ‚Ėą ‚ĖĄ‚ĖÄ‚ĖÄ
# ‚Ėą‚ĖÄ  ‚Ėą‚ĖĄ‚ĖĄ ‚ĖÄ‚ĖĄ‚Ėą ‚ĖÄ‚ĖĄ‚Ėą ‚Ėą ‚Ėą ‚ĖÄ‚Ėą ‚ĖĄ‚Ėą‚Ėą
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'alexwforsythe/tmux-which-key'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'

# ‚ĖĄ‚ĖÄ‚ĖÄ ‚ĖĄ‚ĖÄ‚ĖĄ ‚Ėą   ‚ĖĄ‚ĖÄ‚ĖĄ ‚Ėą‚ĖÄ‚ĖĄ ‚ĖĄ‚ĖÄ‚ĖÄ ‚ĖĄ‚ĖÄ‚ĖÄ ‚Ėą‚ĖĄ‚Ėą ‚Ėą‚Ėą‚ĖÄ ‚Ėą‚ĖĄ ‚ĖĄ‚Ėą ‚Ėą‚Ėą‚ĖÄ
# ‚ĖÄ‚ĖĄ‚ĖĄ ‚ĖÄ‚ĖĄ‚ĖÄ ‚Ėą‚ĖĄ‚ĖĄ ‚ĖÄ‚ĖĄ‚ĖÄ ‚Ėą‚ĖÄ‚ĖĄ ‚ĖĄ‚Ėą‚Ėą ‚ĖÄ‚ĖĄ‚ĖĄ ‚Ėą ‚Ėą ‚Ėą‚ĖĄ‚ĖĄ ‚Ėą ‚ĖÄ ‚Ėą ‚Ėą‚ĖĄ‚ĖĄ
set -g @plugin 'rose-pine/tmux'
set -g @rose_pine_variant 'main'
set -g @rose_pine_host 'on'
set -g @rose_pine_date_time ''
set -g @rose_pine_user 'on'
set -g @rose_pine_directory 'on'
set -g @rose_pine_bar_bg_disable 'on'
set -g @rose_pine_bar_bg_disabled_color_option 'default'

# ‚Ėą‚Ėą‚ĖĄ ‚ĖĄ‚ĖÄ‚ĖĄ ‚ĖĄ‚ĖÄ‚ĖĄ ‚ĖÄ‚Ėą‚ĖÄ ‚ĖĄ‚ĖÄ‚ĖÄ ‚ĖÄ‚Ėą‚ĖÄ ‚Ėą‚ĖÄ‚ĖĄ ‚ĖĄ‚ĖÄ‚ĖĄ ‚Ėą‚ĖÄ‚ĖĄ   ‚Ėą‚ĖÄ‚ĖĄ ‚Ėą   ‚Ėą ‚Ėą ‚ĖĄ‚ĖÄ  ‚Ėą ‚Ėą‚ĖĄ ‚Ėą ‚ĖĄ‚ĖÄ‚ĖÄ
# ‚Ėą‚ĖĄ‚Ėą ‚ĖÄ‚ĖĄ‚ĖÄ ‚ĖÄ‚ĖĄ‚ĖÄ  ‚Ėą  ‚ĖĄ‚Ėą‚Ėą  ‚Ėą  ‚Ėą‚ĖÄ‚ĖĄ ‚Ėą‚ĖÄ‚Ėą ‚Ėą‚ĖÄ    ‚Ėą‚ĖÄ  ‚Ėą‚ĖĄ‚ĖĄ ‚ĖÄ‚ĖĄ‚Ėą ‚ĖÄ‚ĖĄ‚Ėą ‚Ėą ‚Ėą ‚ĖÄ‚Ėą ‚ĖĄ‚Ėą‚Ėą
run '/opt/homebrew/opt/tpm/share/tpm/tpm'

